<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Hello, GH! - Final Pro</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .jumbotron-cyber {
            /* FONDO DE CÓDIGO NEÓN - Mucho más acorde a Sistemas */
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            width: 90%;
            height: 500px;
            border: 2px solid #00f3ff;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .ring-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* El anillo que gira */
        .ring-container::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-top: 3px solid #00f3ff;
            border-bottom: 3px solid #00f3ff;
            border-radius: 50%;
            animation: spinRing 2.5s linear infinite;
            filter: drop-shadow(0 0 12px #00f3ff);
        }

        @keyframes spinRing {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .neon-glow {
            text-shadow: 0 0 15px #00f3ff;
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            text-align: center;
            z-index: 5;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

    <div class="jumbotron-cyber rounded-3">
        <div class="ring-container">
            <h1 class="neon-glow">HELLO,<br>GH!</h1>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
